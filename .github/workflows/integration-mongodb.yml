name: Integration – MongoDB

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/bridge-mongodb/**'
      - '.github/workflows/integration-mongodb.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: MongoDB integration
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bridge-mongodb and its deps
        run: pnpm turbo build --filter=@semilayer/bridge-mongodb...

      - name: Run integration tests
        working-directory: packages/bridge-mongodb
        env:
          DATABASE_URL: mongodb://127.0.0.1:27017/testdb
        run: pnpm test:integration
