name: Integration – MSSQL

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/bridge-mssql/**'
      - 'lib/bridge-sdk/**'
      - '.github/workflows/integration-mssql.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: MSSQL integration
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: 'YourStrong!Passw0rd'
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'YourStrong!Passw0rd' -No -Q 'SELECT 1' || exit 1"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10
          --health-start-period=60s

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bridge-mssql and its deps
        run: pnpm turbo build --filter=@semilayer/bridge-mssql...

      - name: Run integration tests
        working-directory: packages/bridge-mssql
        env:
          DATABASE_URL: 'Server=localhost,1433;Database=master;User Id=SA;Password=YourStrong!Passw0rd;Encrypt=false;TrustServerCertificate=true'
        run: pnpm test:integration
