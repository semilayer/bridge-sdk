name: CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - name: Smoke test — resolver imports without crashing
        run: node --input-type=module --eval "import('./lib/bridge-resolver/dist/index.js').then(() => console.log('resolver ok'))"

      - run: pnpm turbo lint

      - run: pnpm turbo typecheck

      - run: pnpm turbo test
