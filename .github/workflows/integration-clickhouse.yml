name: Integration – ClickHouse

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/bridge-clickhouse/**'
      - 'lib/bridge-sdk/**'
      - '.github/workflows/integration-clickhouse.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: ClickHouse integration
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24-alpine
        ports:
          - 8123:8123
        # Cold-start of clickhouse-server on alpine + ARM emulation in
        # GitHub-hosted runners can take ~90s before /ping returns 200.
        # Keep generous retries and a long start-period to avoid flakes.
        options: >-
          --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=30
          --health-start-period=60s

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bridge-clickhouse and its deps
        run: pnpm turbo build --filter=@semilayer/bridge-clickhouse...

      - name: Run integration tests
        working-directory: packages/bridge-clickhouse
        env:
          CLICKHOUSE_URL: http://default:@127.0.0.1:8123/default
        run: pnpm test:integration
